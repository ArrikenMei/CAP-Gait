data_cfg:
  dataset_name: SUSTech1K
  dataset_root: "your data root"
  dataset_partition: "your json root"
  num_workers: 4
  # Lexicographic order in each sequence folder:
  # 03-*-Camera-Pose.pkl and 06-*-Camera-Sils_aligned.pkl are enabled.
  data_in_use: [false, false, false, true, false, false, true, false, false, false, false, false, false, false, false, false]
  remove_no_gallery: false
  test_dataset_name: SUSTech1K

evaluator_cfg:
  enable_float16: true
  restore_ckpt_strict: true
  restore_hint: 100000
  save_name: CAR-Gait_SUSTech1K_4070TiSuper
  eval_func: evaluate_indoor_dataset
  metric: euc
  sampler:
    batch_shuffle: false
    batch_size: 1
    sample_type: all_ordered
    frames_all_limit: 720
  transform:
    - type: NormalizeEmpty
    - type: BaseSilCuttingTransform

loss_cfg:
  - loss_term_weight: 1.0
    margin: 0.2
    type: TripletLoss
    log_prefix: triplet
  - loss_term_weight: 1.0
    scale: 16
    type: CrossEntropyLoss
    log_prefix: softmax
    log_accuracy: true

model_cfg:
  model: CAR_Gait
  use_emb2: false
  joint_format: coco
  parts_num: 16
  embedding_channels: 192
  aux_warmup_iter: 15000
  condition_keys:
    - 00
    - 01
    - bg
    - cl
    - cr
    - ub
    - uf
    - oc
    - nt
  Backbone:
    layers:
      - 1
      - 1
      - 1
      - 1
    channels:
      - 48
      - 96
      - 192
      - 384
  PoseEncoder:
    hidden_channels:
      - 48
      - 96
      - 96
  SeparateBNNecks:
    class_num: 250
  loss_weights:
    condition_adv: 0.2
    state_consistency: 0.2
    pose_sil: 0.05

optimizer_cfg:
  lr: 0.1
  momentum: 0.9
  solver: SGD
  weight_decay: 0.0005

scheduler_cfg:
  gamma: 0.1
  milestones:
    - 40000
    - 60000
    - 80000
  scheduler: MultiStepLR

trainer_cfg:
  enable_float16: true
  fix_BN: false
  with_test: true
  log_iter: 100
  restore_ckpt_strict: true
  restore_hint: 0
  save_iter: 10000
  save_name: CAR-Gait_SUSTech1K_4070TiSuper
  sync_BN: false
  total_iter: 100000
  sampler:
    batch_shuffle: true
    batch_size:
      - 4
      - 8
    frames_num_fixed: 30
    frames_skip_num: 2
    sample_type: fixed_ordered
    type: TripletSampler
  transform:
    - type: Compose
      trf_cfg:
        - type: NormalizeEmpty
        - type: FlipSequence
          probability: 0.5
        - type: JointNoise
          std: 0.1
    - type: Compose
      trf_cfg:
        - type: BaseSilCuttingTransform
        - type: RandomHorizontalFlip
          prob: 0.2
        - type: RandomRotate
          prob: 0.2
